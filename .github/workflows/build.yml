name: build

# Build the Windows release and attach the installer to a GitHub Release when a
# version tag (vX.Y.Z) is pushed. Can also be run manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app + installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing: add these repository secrets from `tauri signer generate`.
          # The updater manifest (latest.json) + .sig are produced only when the private
          # key is present (with createUpdaterArtifacts: true in tauri.conf.json).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "SessionMeter ${{ github.ref_name }}"
          # Draft releases are NOT seen by the updater's `releases/latest` endpoint;
          # publish the drafted release to make an update available to installed apps.
          releaseDraft: true
          releaseBody: "See the changelog for details."

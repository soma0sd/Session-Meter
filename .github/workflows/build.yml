name: build

# Build the Windows release and attach the installer to a GitHub Release when a
# version tag (vX.Y.Z) is pushed. Can also be run manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app + installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing: add these repository secrets from `tauri signer generate`.
          # The updater manifest (latest.json) + .sig are produced only when the private
          # key is present (with createUpdaterArtifacts: true in tauri.conf.json).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "SessionMeter ${{ github.ref_name }}"
          # Publish as a PRERELEASE (not a draft), then promote it manually to ship the update.
          # Why not a draft: a draft has no real git tag, and publishing it can leave the release
          # detached from the version tag (an "untagged-<hash>" slug), which breaks the updater's
          # installer URL (releases/download/vX.Y.Z/...setup.exe -> 404). A prerelease is created
          # already tagged, so the assets are always reachable.
          # Gate: the updater's `releases/latest` endpoint ignores prereleases, so installed apps
          # do NOT see it yet. To ship to users, edit the release on GitHub and uncheck
          # "Set as a pre-release" (promote to Latest) — the tag stays intact.
          releaseDraft: false
          prerelease: true
          releaseBody: "See the changelog for details."
